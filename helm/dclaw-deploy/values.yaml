replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-deploy
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8117

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: deploy.dclawstack.io
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi

postgresql:
  enabled: true
  primary:
    persistence:
      size: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""
